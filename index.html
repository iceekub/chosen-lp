        <link rel="preconnect" href="https://fonts.googleapis.com" />

            rel="stylesheet"
        />
        <title>Chosen | A Sanctuary for Modern Devotion</title>
        <script>
            // Restore path encoded by 404.html for GitHub Pages SPA routing
            (function () {
                var p = new URLSearchParams(window.location.search).get("p");
                if (p) {
                    window.history.replaceState(null, null, "/" + decodeURIComponent(p) + window.location.hash);
                }
            })();
        </script>
    </head>

    </body>
